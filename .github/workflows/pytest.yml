name: Python Pytest CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip' # Caches pip dependencies for faster subsequent runs

    - name: Install System Dependencies (GIS)
      run: |
        sudo apt-get update
        # rtree requires the C-library libspatialindex to be installed on Linux
        sudo apt-get install -y libspatialindex-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio flake8 pytest-cov
        pip install pydantic shapely rtree pyyaml aiofiles filelock langchain-core langchain-google-genai langgraph fastapi uvicorn
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Stop the build if there are critical Python syntax errors or undefined names
        flake8 server/ test/server/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Run general formatting checks (treat as warnings so it doesn't block the build immediately)
        flake8 server/ test/server/ --count --exit-zero --max-complexity=15 --max-line-length=128 --statistics

    - name: Run Pytest Suite
      run: |
        pytest test/server/ -v --cov=server --cov-report=term